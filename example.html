<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能力量训练 - 实时动作捕捉反馈</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  /* ===== Main Container ===== */
  .app {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== Background: Simulated Gym Scene ===== */
  .bg-canvas {
    position: absolute; inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg-canvas canvas {
    width: 100%; height: 100%;
    display: block;
  }

  /* ===== Glassmorphism Card Base ===== */
  .glass {
    background: rgba(18, 22, 36, 0.75);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }
  .glass-dark {
    background: rgba(10, 12, 22, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ===== Top Warning Bar ===== */
  .warning-bar {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, rgba(220, 38, 38, 0.92), rgba(185, 28, 28, 0.92));
    backdrop-filter: blur(8px);
    border-radius: 100px;
    padding: 10px 28px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid rgba(255, 80, 80, 0.3);
    box-shadow: 0 4px 24px rgba(220, 38, 38, 0.35);
    animation: warningPulse 2s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes warningPulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(220, 38, 38, 0.35); }
    50% { box-shadow: 0 4px 40px rgba(220, 38, 38, 0.6); }
  }
  .warning-icon {
    width: 22px; height: 22px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .warning-bar span {
    font-size: 15px; font-weight: 600; letter-spacing: 0.5px;
    color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* ===== Left Panel: Physiological ===== */
  .panel-left {
    position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
    z-index: 10;
    width: 210px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel-left .glass { padding: 16px 18px; }

  .metric-label {
    font-size: 11px; color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 4px;
  }
  .metric-value {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    display: flex; align-items: baseline; gap: 4px;
  }
  .metric-value .unit { font-size: 13px; font-weight: 500; opacity: 0.6; }
  .metric-value.red { color: #ef4444; }
  .metric-value.green { color: #22c55e; }
  .metric-value.blue { color: #3b82f6; }

  .progress-track {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    margin-top: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.6s ease;
  }
  .progress-fill.red { background: linear-gradient(90deg, #ef4444, #f97316); }
  .progress-fill.green { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .progress-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .progress-fill.orange { background: linear-gradient(90deg, #f97316, #fb923c); }

  .zone-labels {
    display: flex; justify-content: space-between;
    font-size: 9px; color: rgba(255,255,255,0.3);
    margin-top: 4px;
  }
  .zone-labels .active { color: rgba(255,255,255,0.7); font-weight: 600; }

  .sub-text {
    font-size: 12px; color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }

  .intensity-badge {
    display: inline-block;
    font-size: 11px; font-weight: 600; padding: 2px 10px;
    border-radius: 100px;
    background: rgba(251, 146, 60, 0.2);
    color: #fb923c;
    margin-top: 4px;
  }

  /* ===== Right Panel: Exercise Tracking ===== */
  .panel-right {
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    z-index: 10;
    width: 220px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel-right .glass { padding: 16px 18px; }

  .exercise-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .exercise-name {
    font-size: 16px; font-weight: 600;
  }

  .set-counter {
    display: flex; align-items: baseline; gap: 6px;
    margin-bottom: 4px;
  }
  .set-counter .current {
    font-size: 36px; font-weight: 700; color: #60a5fa;
    line-height: 1;
  }
  .set-counter .total {
    font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.4);
  }
  .set-counter .set-label {
    font-size: 13px; color: rgba(255,255,255,0.5);
    margin-left: auto;
  }

  .rep-info {
    display: flex; justify-content: space-between;
    font-size: 13px; color: rgba(255,255,255,0.6);
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* Rhythm Circle */
  .rhythm-block {
    display: flex; align-items: center; gap: 14px;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .rhythm-ring {
    position: relative;
    width: 56px; height: 56px;
    flex-shrink: 0;
  }
  .rhythm-ring svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .rhythm-ring .bg-ring {
    fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4;
  }
  .rhythm-ring .fg-ring {
    fill: none; stroke: #60a5fa; stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease;
  }
  .rhythm-ring .center-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #60a5fa;
  }
  .rhythm-info {
    flex: 1;
  }
  .rhythm-label {
    font-size: 11px; color: rgba(255,255,255,0.4);
  }
  .rhythm-status {
    font-size: 14px; font-weight: 600; color: #fbbf24;
    margin-top: 1px;
  }
  .rhythm-hint {
    font-size: 11px; color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  /* ===== Center: Skeleton Canvas ===== */
  .skeleton-layer {
    position: absolute; inset: 0;
    z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }
  .skeleton-layer canvas {
    width: 100%; height: 100%;
    display: block;
  }

  /* ===== Bottom Tip Bar (below skeleton) ===== */
  .tip-bar {
    position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%);
    z-index: 15;
    background: rgba(10, 12, 22, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 13px; color: rgba(255,255,255,0.8);
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .tip-bar .tip-icon { opacity: 0.5; }

  /* ===== Bottom Controls ===== */
  .controls {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    display: flex; gap: 16px; align-items: center;
  }
  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border: none; border-radius: 12px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-pause {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-pause:hover { background: rgba(255,255,255,0.14); }
  .btn-stop {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    color: #fff;
    box-shadow: 0 4px 16px rgba(220, 38, 38, 0.3);
  }
  .btn-stop:hover { box-shadow: 0 4px 24px rgba(220, 38, 38, 0.45); }

  .btn-icon {
    font-size: 16px; line-height: 1;
  }

  /* ===== Responsive ===== */
  @media (max-width: 860px) {
    .panel-left { width: 170px; left: 12px; }
    .panel-right { width: 180px; right: 12px; }
    .panel-left .glass { padding: 12px 14px; }
    .panel-right .glass { padding: 12px 14px; }
    .metric-value { font-size: 22px; }
    .set-counter .current { font-size: 28px; }
    .warning-bar { padding: 8px 18px; }
    .warning-bar span { font-size: 13px; }
  }
  @media (max-width: 640px) {
    .panel-left { left: 8px; width: 140px; }
    .panel-right { right: 8px; width: 150px; }
    .metric-value { font-size: 18px; }
    .set-counter .current { font-size: 22px; }
    .btn { padding: 10px 18px; font-size: 12px; }
    .warning-bar { padding: 6px 14px; }
    .warning-bar span { font-size: 11px; }
    .rhythm-ring { width: 42px; height: 42px; }
    .glass { padding: 12px 14px !important; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Background Scene -->
  <div class="bg-canvas">
    <canvas id="bgCanvas"></canvas>
  </div>

  <!-- Top Warning -->
  <div class="warning-bar" id="warningBar">
    <div class="warning-icon">⚠</div>
    <span id="warningText">身体前倾，请注意姿势！</span>
  </div>

  <!-- Left Panel: Physiological -->
  <div class="panel-left">
    <!-- Heart Rate -->
    <div class="glass">
      <div class="metric-label">❤ 心率</div>
      <div class="metric-value red"><span id="heartRate">132</span><span class="unit">BPM</span></div>
      <div class="progress-track">
        <div class="progress-fill red" id="hrProgress" style="width:66%"></div>
      </div>
      <div class="zone-labels">
        <span>热身</span>
        <span class="active">燃脂</span>
        <span>强度</span>
      </div>
    </div>

    <!-- Calories -->
    <div class="glass">
      <div class="metric-label">🔥 卡路里消耗</div>
      <div class="metric-value green"><span id="calories">56</span><span class="unit">kcal</span></div>
      <div class="sub-text" id="calSub">≈ 约 0.5 碗米饭</div>
    </div>

    <!-- Intensity -->
    <div class="glass">
      <div class="metric-label">💪 训练强度</div>
      <div class="intensity-badge" id="intensityBadge">中强度 · 燃脂中</div>
      <div class="progress-track" style="margin-top:10px">
        <div class="progress-fill orange" id="intensityProgress" style="width:55%"></div>
      </div>
    </div>
  </div>

  <!-- Center Skeleton Overlay -->
  <div class="skeleton-layer">
    <canvas id="skeletonCanvas"></canvas>
  </div>

  <!-- Tip Bar -->
  <div class="tip-bar">
    <span class="tip-icon">💡</span>
    <span id="tipText">推胸时注意躯干前倾过大，请收紧核心</span>
  </div>

  <!-- Right Panel: Exercise Tracking -->
  <div class="panel-right">
    <div class="glass">
      <div class="exercise-header">
        <div class="status-dot"></div>
        <span class="exercise-name" id="exerciseName">推胸</span>
      </div>

      <div class="set-counter">
        <span class="current" id="currentSet">3</span>
        <span class="total">/ 4</span>
        <span class="set-label">组</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill blue" id="setProgress" style="width:75%"></div>
      </div>

      <div class="rep-info">
        <span>每组次数</span>
        <span style="color:#fff;font-weight:600" id="repCount">12</span>
      </div>

      <div class="rhythm-block">
        <div class="rhythm-ring">
          <svg viewBox="0 0 56 56">
            <circle class="bg-ring" cx="28" cy="28" r="24"/>
            <circle class="fg-ring" id="rhythmRing" cx="28" cy="28" r="24"
                    stroke-dasharray="150.8" stroke-dashoffset="45"/>
          </svg>
          <div class="center-text" id="rhythmValue">32</div>
        </div>
        <div class="rhythm-info">
          <div class="rhythm-label">动作节奏</div>
          <div class="rhythm-status" id="rhythmStatus">节奏偏慢</div>
          <div class="rhythm-hint" id="rhythmHint">保持稳定，建议加快</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <button class="btn btn-pause" id="btnPause">
      <span class="btn-icon">⏸</span>
      <span>暂停</span>
    </button>
    <button class="btn btn-stop" id="btnStop">
      <span class="btn-icon">⏹</span>
      <span>结束训练</span>
    </button>
  </div>
</div>

<script>
// ===== 1. Background Scene (Simulated Gym) =====
(function drawBg() {
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let w, h;

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Gym scene: dark walls, equipment silhouettes, floor
  function draw() {
    // Floor
    const floorY = h * 0.72;
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.45, '#1e1e32');
    grad.addColorStop(0.65, '#2a2a3e');
    grad.addColorStop(0.72, '#3a3a4e');
    grad.addColorStop(0.73, '#2e2e3e');
    grad.addColorStop(1, '#1e1e2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Wall horizontal lines
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    for (let y = 0; y < floorY; y += 80) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Floor tiles
    const tileSize = 60;
    const offX = (w % tileSize) / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let x = -tileSize; x < w + tileSize; x += tileSize) {
      ctx.beginPath(); ctx.moveTo(x + offX, floorY); ctx.lineTo(x + offX - 80, h); ctx.stroke();
    }
    for (let y = floorY; y < h; y += 20) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Equipment silhouettes - left: cable machine
    const eqGrad = ctx.createLinearGradient(w * 0.12, 0, w * 0.12 + 60, 0);
    eqGrad.addColorStop(0, 'rgba(30,30,50,0.6)');
    eqGrad.addColorStop(1, 'rgba(40,40,60,0.3)');
    ctx.fillStyle = eqGrad;
    // Frame
    ctx.fillRect(w * 0.08, h * 0.22, 8, floorY - h * 0.22);
    ctx.fillRect(w * 0.08 + 52, h * 0.22, 8, floorY - h * 0.22);
    // Top bar
    ctx.fillRect(w * 0.08, h * 0.20, 60, 6);
    // Weight stack
    ctx.fillStyle = 'rgba(40,40,60,0.4)';
    ctx.fillRect(w * 0.08 + 10, h * 0.40, 14, floorY - h * 0.40);
    ctx.fillRect(w * 0.08 + 36, h * 0.40, 14, floorY - h * 0.40);

    // Right: dumbbell rack silhouettes
    ctx.fillStyle = 'rgba(35,35,55,0.5)';
    const rackX = w * 0.82;
    ctx.fillRect(rackX, h * 0.35, 6, floorY - h * 0.35);
    ctx.fillRect(rackX + 54, h * 0.35, 6, floorY - h * 0.35);
    ctx.fillRect(rackX, h * 0.34, 60, 8);
    // Dumbbells
    for (let i = 0; i < 4; i++) {
      const dy = h * 0.38 + i * 28;
      ctx.fillStyle = 'rgba(50,50,70,0.35)';
      ctx.fillRect(rackX - 6, dy, 8, 16);
      ctx.fillRect(rackX + 52, dy, 8, 16);
      ctx.fillStyle = 'rgba(40,40,60,0.3)';
      ctx.fillRect(rackX + 2, dy + 2, 50, 12);
    }

    // Subtle window light effect (top right)
    const lightGrad = ctx.createRadialGradient(w * 0.75, h * 0.08, 0, w * 0.75, h * 0.08, w * 0.25);
    lightGrad.addColorStop(0, 'rgba(100,140,200,0.04)');
    lightGrad.addColorStop(1, 'rgba(100,140,200,0)');
    ctx.fillStyle = lightGrad;
    ctx.fillRect(0, 0, w, h);

    // Warm light from floor
    const floorGlow = ctx.createRadialGradient(w * 0.5, floorY + 20, 0, w * 0.5, floorY + 20, w * 0.35);
    floorGlow.addColorStop(0, 'rgba(200,160,100,0.02)');
    floorGlow.addColorStop(1, 'rgba(200,160,100,0)');
    ctx.fillStyle = floorGlow;
    ctx.fillRect(0, floorY, w, h - floorY);
  }
  draw();
  window.addEventListener('resize', draw);
})();

// ===== 2. Skeleton Overlay =====
(function skeleton() {
  const c = document.getElementById('skeletonCanvas');
  const ctx = c.getContext('2d');
  let w, h;

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // H36M joint indices (17 joints) with initial positions scaled to canvas
  // Order: 0:RFoot,1:RKnee,2:RHip,3:LHip,4:LKnee,5:LFoot,6:Spine,7:Thorax,
  //        8:Neck,9:Head,10:LShoulder,11:LElbow,12:LWrist,13:RShoulder,14:RElbow,15:RWrist
  const joints = [
    { x: 0.42, y: 0.80 }, // RFoot
    { x: 0.44, y: 0.65 }, // RKnee
    { x: 0.46, y: 0.52 }, // RHip
    { x: 0.54, y: 0.52 }, // LHip
    { x: 0.56, y: 0.65 }, // LKnee
    { x: 0.58, y: 0.80 }, // LFoot
    { x: 0.50, y: 0.48 }, // Spine (mid-hip)
    { x: 0.50, y: 0.36 }, // Thorax
    { x: 0.50, y: 0.27 }, // Neck
    { x: 0.50, y: 0.14 }, // Head
    { x: 0.40, y: 0.30 }, // LShoulder
    { x: 0.34, y: 0.38 }, // LElbow
    { x: 0.30, y: 0.46 }, // LWrist
    { x: 0.60, y: 0.30 }, // RShoulder
    { x: 0.66, y: 0.38 }, // RElbow
    { x: 0.70, y: 0.46 }, // RWrist
  ];

  // Connections [jointIdxA, jointIdxB]
  const bones = [
    [0,1],[1,2],[2,3],[3,4],[4,5],         // legs
    [2,6],[3,6],                            // hips to spine base
    [6,7],[7,8],[8,9],                     // torso
    [7,10],[10,11],[11,12],                 // left arm
    [7,13],[13,14],[14,15],                 // right arm
  ];

  let time = 0;

  function draw() {
    ctx.clearRect(0, 0, w, h);
    time += 0.016;

    const cx = w / 2;
    const cy = h * 0.46;
    const scale = Math.min(w, h) * 0.42;

    // Apply breathing motion + chest press animation
    const breath = Math.sin(time * 0.8) * 0.012;
    const pressPhase = Math.sin(time * 0.6) * 0.04; // arms move in/out

    const pts = joints.map((j, i) => {
      let px = (j.x - 0.5) * scale + cx;
      let py = (j.y - 0.5) * scale + cy + h * 0.04;

      // Breathing: vertical oscillation
      py += breath * h;

      // Arm motion for chest press simulation
      if (i === 11 || i === 12) { // left arm
        px -= pressPhase * w * 0.5;
        py += Math.abs(pressPhase) * h * 0.08;
      }
      if (i === 14 || i === 15) { // right arm
        px += pressPhase * w * 0.5;
        py += Math.abs(pressPhase) * h * 0.08;
      }
      // Shoulders move slightly
      if (i === 10) px -= pressPhase * w * 0.15;
      if (i === 13) px += pressPhase * w * 0.15;

      return { x: px, y: py };
    });

    // Draw bones
    ctx.lineCap = 'round';
    for (const [a, b] of bones) {
      const p1 = pts[a], p2 = pts[b];
      const x1 = p1.x, y1 = p1.y, x2 = p2.x, y2 = p2.y;
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      const width = Math.max(2, len * 0.08);

      // Glow line
      ctx.shadowColor = 'rgba(96, 165, 250, 0.3)';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = 'rgba(96, 165, 250, 0.7)';
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      // Inner bright line
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(180, 210, 255, 0.9)';
      ctx.lineWidth = width * 0.45;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // Draw joint dots
    for (const p of pts) {
      const r = Math.max(3, scale * 0.025);
      // Outer glow
      ctx.shadowColor = 'rgba(96, 165, 250, 0.4)';
      ctx.shadowBlur = 12;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 1.8);
      grad.addColorStop(0, 'rgba(140, 200, 255, 1)');
      grad.addColorStop(0.5, 'rgba(96, 165, 250, 0.8)');
      grad.addColorStop(1, 'rgba(96, 165, 250, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 1.8, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#8cc8ff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    // Head glow
    const head = pts[9];
    const headR = scale * 0.045;
    ctx.shadowBlur = 0;
    const headGrad = ctx.createRadialGradient(head.x, head.y - headR * 0.3, 0, head.x, head.y, headR * 1.2);
    headGrad.addColorStop(0, 'rgba(96,165,250,0.3)');
    headGrad.addColorStop(1, 'rgba(96,165,250,0)');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(head.x, head.y, headR * 1.2, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== 3. Real-time Mock Data =====
(function mockData() {
  let paused = false;
  let hr = 132, cal = 56, set = 3, repInSet = 8, rhythmVal = 32;
  let intensityPct = 55;
  let warningActive = true;
  const warnings = ['身体前倾，请注意姿势！', '肘部角度过大，请保持90度', '呼吸节奏紊乱，请配合动作吐气'];
  const tips = ['推胸时注意躯干前倾过大，请收紧核心', '下放时肘部与躯干保持45度角', '向上推时呼气，下放时吸气'];
  const statuses = ['节奏偏慢', '节奏适中', '节奏偏快'];
  const hints = ['保持稳定，建议加快', '节奏良好，继续保持', '请适当放慢，控制动作质量'];
  let warnIdx = 0, tipIdx = 0;
  let rhythmPhase = 0;

  const hrEl = document.getElementById('heartRate');
  const calEl = document.getElementById('calories');
  const calSub = document.getElementById('calSub');
  const hrProgress = document.getElementById('hrProgress');
  const intensityBadge = document.getElementById('intensityBadge');
  const intensityProgress = document.getElementById('intensityProgress');
  const currentSetEl = document.getElementById('currentSet');
  const setProgress = document.getElementById('setProgress');
  const repCountEl = document.getElementById('repCount');
  const rhythmValEl = document.getElementById('rhythmValue');
  const rhythmRing = document.getElementById('rhythmRing');
  const rhythmStatus = document.getElementById('rhythmStatus');
  const rhythmHint = document.getElementById('rhythmHint');
  const warningText = document.getElementById('warningText');
  const tipText = document.getElementById('tipText');
  const warningBar = document.getElementById('warningBar');

  // Pause button
  const btnPause = document.getElementById('btnPause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.querySelector('.btn-icon').textContent = paused ? '▶' : '⏸';
    btnPause.querySelector('span:last-child').textContent = paused ? '继续' : '暂停';
    btnPause.style.borderColor = paused ? 'rgba(96,165,250,0.3)' : 'rgba(255,255,255,0.1)';
    btnPause.style.background = paused ? 'rgba(96,165,250,0.12)' : 'rgba(255,255,255,0.08)';
  });

  // Stop button
  document.getElementById('btnStop').addEventListener('click', () => {
    if (confirm('确定要结束本次训练吗？')) {
      location.reload();
    }
  });

  const RING_CIRCUM = 2 * Math.PI * 24; // ~150.8

  function update() {
    if (!paused) {
      // HR: fluctuate ±3 around 132
      hr += (Math.random() - 0.48) * 2;
      hr = Math.max(115, Math.min(155, hr));
      hrEl.textContent = Math.round(hr);

      // HR progress bar (zone: warmup<50, fatburn 50-75, intense 75-100)
      hrProgress.style.width = Math.min(100, (hr / 160) * 100) + '%';

      // Calories: slowly increase
      cal += Math.random() * 0.15 + 0.05;
      calEl.textContent = Math.round(cal);
      const riceBowl = (cal / 100).toFixed(1);
      calSub.textContent = `≈ 约 ${riceBowl} 碗米饭`;

      // Intensity: drift
      intensityPct += (Math.random() - 0.5) * 2;
      intensityPct = Math.max(30, Math.min(85, intensityPct));
      intensityProgress.style.width = intensityPct + '%';
      if (intensityPct < 45) {
        intensityBadge.textContent = '低强度 · 热身中';
        intensityBadge.style.color = '#60a5fa';
        intensityBadge.style.background = 'rgba(96,165,250,0.15)';
      } else if (intensityPct < 70) {
        intensityBadge.textContent = '中强度 · 燃脂中';
        intensityBadge.style.color = '#fb923c';
        intensityBadge.style.background = 'rgba(251,146,60,0.15)';
      } else {
        intensityBadge.textContent = '高强度 · 极限中';
        intensityBadge.style.color = '#ef4444';
        intensityBadge.style.background = 'rgba(239,68,68,0.15)';
      }

      // Rep count & sets
      repInSet += 0.03 + Math.random() * 0.04;
      if (repInSet >= 12) {
        repInSet = 0;
        set = Math.min(4, set + 1);
        currentSetEl.textContent = set;
        setProgress.style.width = (set / 4 * 100) + '%';
        if (set >= 4) {
          // Cycle back: simulate new round
          setTimeout(() => {
            set = 1;
            currentSetEl.textContent = set;
            setProgress.style.width = '25%';
          }, 2000);
        }
      }
      repCountEl.textContent = Math.min(12, Math.floor(repInSet));

      // Rhythm: cycle through slow→moderate→fast
      rhythmPhase += 0.002;
      const r = Math.sin(rhythmPhase);
      if (r < -0.5) {
        rhythmVal = 26 + Math.random() * 4;
        rhythmStatus.textContent = statuses[0];
        rhythmHint.textContent = hints[0];
        rhythmStatus.style.color = '#fbbf24';
      } else if (r < 0.5) {
        rhythmVal = 38 + Math.random() * 4;
        rhythmStatus.textContent = statuses[1];
        rhythmHint.textContent = hints[1];
        rhythmStatus.style.color = '#22c55e';
      } else {
        rhythmVal = 50 + Math.random() * 6;
        rhythmStatus.textContent = statuses[2];
        rhythmHint.textContent = hints[2];
        rhythmStatus.style.color = '#ef4444';
      }
      rhythmValEl.textContent = Math.round(rhythmVal);
      // Ring: lower value = more filled (slower = more full)
      const pct = Math.max(0.1, Math.min(1, (Math.round(rhythmVal) - 20) / 50));
      const offset = RING_CIRCUM * (1 - pct);
      rhythmRing.setAttribute('stroke-dashoffset', offset);
      rhythmRing.setAttribute('stroke-dasharray', RING_CIRCUM);

      // Warning rotation
      if (Math.random() < 0.003) {
        warnIdx = (warnIdx + 1) % warnings.length;
        warningText.textContent = warnings[warnIdx];
        tipIdx = warnIdx;
        tipText.textContent = tips[tipIdx];
        // Flash warning
        warningBar.style.transition = 'opacity 0.15s';
        warningBar.style.opacity = '0.7';
        setTimeout(() => { warningBar.style.opacity = '1'; }, 150);
      }
    }

    requestAnimationFrame(update);
  }

  // Run update loop at ~10fps for mock data (separate from render)
  setInterval(() => {
    if (!paused) {
      // Background data ticks
    }
  }, 100);
  requestAnimationFrame(update);
})();
</script>
