<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPS Analyze Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; background: #111; color: #ccc; font-family: monospace; overflow: hidden; }

  /* ---- 左侧菜单 ---- */
  #nav { width: 160px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
  #nav h3 { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; font-size: 13px; }
  #nav .item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; transition: background .15s; }
  #nav .item:hover { background: #2a2a2a; }
  #nav .item.active { background: #0a4; color: #fff; }

  /* ---- 视频 + 3D 区域 ---- */
  #view { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #video-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; min-height: 0; }
  #video-area img { max-width: 100%; max-height: 100%; }
  #divider { height: 4px; background: #333; cursor: row-resize; flex-shrink: 0; }
  #divider:hover { background: #555; }
  #three-area { flex: 1; background: #0a0a14; min-height: 80px; position: relative; }
  #canvas-container { width: 100%; height: 100%; }

  /* ---- 右侧面板全高 ---- */
  #panel { width: 300px; background: #1a1a1a; border-left: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }

  /* ---- 控制按钮 ---- */
  #ctls { display: flex; padding: 8px; gap: 6px; background: #222; border-bottom: 1px solid #333; }
  #ctls button { flex: 1; padding: 8px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: #fff; }
  #btn-start { background: #0a4; }
  #btn-pause { background: #a80; }
  #btn-stop  { background: #a22; }
  #btn-start[disabled], #btn-pause[disabled], #btn-stop[disabled] { opacity: 0.4; cursor: default; }

  /* ---- 统计面板 ---- */
  #stats { padding: 10px 16px; background: #1c1c28; border-bottom: 1px solid #333; font-size: 12px; line-height: 1.8; }
  #stats .row { display: flex; justify-content: space-between; }
  #stats .row .lbl { color: #888; }
  #stats .row .val { color: #eee; font-weight: bold; }
  #stats .tid { font-size: 10px; color: #666; padding-bottom: 6px; }

  /* ---- 消息 ---- */
  #panel h3 { padding: 10px 16px; background: #222; border-bottom: 1px solid #333; font-size: 13px; }
  #log { flex: 1; overflow-y: auto; padding: 8px 16px; }
  #log .msg { padding: 4px 0; border-bottom: 1px solid #222; font-size: 11px; line-height: 1.4; }
  #log .msg .ts { color: #888; }
</style>
</head>
<body>

<!-- 左侧菜单 -->
<div id="nav"><h3>Poses</h3></div>

<!-- 视频 + 3D 区域 -->
<div id="view">
  <div id="video-area"><img id="stream" alt="waiting for stream..." /></div>
  <div id="divider"></div>
  <div id="three-area"><div id="canvas-container"></div></div>
</div>

<!-- 右侧面板 -->
<div id="panel">
  <div id="ctls">
    <button id="btn-start" onclick="ctrl('start')">开始</button>
    <button id="btn-pause" onclick="ctrl('pause')">暂停</button>
    <button id="btn-stop"  onclick="ctrl('stop')">停止</button>
  </div>
  <div id="stats">
    <div class="tid" id="s-tid">ID: ---</div>
    <div class="row"><span class="lbl">动作标准率</span> <span class="val" id="s-acc">--</span></div>
    <div class="row"><span class="lbl">髋关节活动度</span> <span class="val" id="s-rom">-- °</span></div>
    <div class="row"><span class="lbl">左右发力差异</span> <span class="val" id="s-bal">--</span></div>
    <div class="row"><span class="lbl">训练密度</span> <span class="val" id="s-den">-- /min</span></div>
    <div class="row"><span class="lbl">总消耗热量</span> <span class="val" id="s-cal">-- kcal</span></div>
    <div class="row"><span class="lbl">动作重复次数</span> <span class="val" id="s-rep">0</span></div>
    <div class="row"><span class="lbl">肌肉疲劳度</span> <span class="val" id="s-fat">--</span></div>
  </div>
  <h3>训练历史 <span style="font-size:10px;color:#888;float:right" id="h-count">0</span></h3>
  <div id="history" style="max-height:120px;overflow-y:auto;padding:4px 16px;font-size:11px;"></div>
  <h3>Messages</h3>
  <div id="log"></div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =========================================================================
// Control
// =========================================================================
const btnStart = document.getElementById("btn-start");
const btnPause = document.getElementById("btn-pause");
const btnStop  = document.getElementById("btn-stop");

function setBtnState(state) {
  btnStart.disabled = (state === "running");
  btnPause.disabled = (state !== "running");
  btnStop.disabled  = (state === "stopped");
}

function ctrl(action) {
  fetch(`/control/${action}`, { method: "POST" });
}

function refreshHistory() {
  fetch("/history").then(r => r.json()).then(d => {
    if (!d.ok) return;
    const items = d.data.slice(-5).reverse();
    const el = document.getElementById("history");
    document.getElementById("h-count").textContent = d.data.length;
    el.innerHTML = items.map(s =>
      `<div style="padding:3px 0;border-bottom:1px solid #222;cursor:pointer"
            onclick="window.open('/stats/${s.training_id}','_blank')">
        <span style="color:#0af">${s.training_id}</span>
        <span style="color:#888">${s.pose_name||""}</span>
        <span style="float:right">${s.total_reps||0}rep ${(s.accuracy*100).toFixed(0)}%</span>
      </div>`
    ).join("");
  });
}

// =========================================================================
// WebSocket
// =========================================================================
const img = document.getElementById("stream");
const logEl = document.getElementById("log");
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.binaryType = "blob";

const stats = {
  tid: document.getElementById("s-tid"),
  acc: document.getElementById("s-acc"),
  rom: document.getElementById("s-rom"),
  bal: document.getElementById("s-bal"),
  den: document.getElementById("s-den"),
  cal: document.getElementById("s-cal"),
  rep: document.getElementById("s-rep"),
  fat: document.getElementById("s-fat"),
};

ws.onmessage = (e) => {
  if (e.data instanceof Blob) {
    const url = URL.createObjectURL(e.data);
    img.src = url;
    img.onload = () => URL.revokeObjectURL(url);
  } else {
    const msg = JSON.parse(e.data);
    if (msg.type === "stats") {
      setBtnState(msg.state);
      refreshHistory();
      stats.tid.textContent = "ID: " + msg.training_id;
      stats.acc.textContent = (msg.accuracy * 100).toFixed(1) + "%";
      stats.rom.textContent = msg.rom.toFixed(1) + " °";
      stats.bal.textContent = msg.balance_score.toFixed(0);
      stats.den.textContent = msg.density.toFixed(1) + " /min";
      stats.cal.textContent = msg.calories.toFixed(1) + " kcal";
      stats.rep.textContent = msg.total_reps;
      stats.fat.textContent = (msg.fatigue_score < 20 ? "轻微" : msg.fatigue_score < 50 ? "中度" : "显著") + " (" + msg.fatigue_score.toFixed(0) + ")";
    } else if (msg.type === "log") {
      if (msg.text.startsWith("rep:")) stats.rep.textContent = msg.text.slice(4);
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="ts">${msg.ts}</span> ${msg.text}`;
      logEl.appendChild(div);
      while (logEl.children.length > 300) logEl.firstChild.remove();
      logEl.scrollTop = logEl.scrollHeight;
    } else if (msg.type === "kps3d") {
      updateSkeleton(msg.data);
    }
  }
};
ws.onclose = () => img.alt = "disconnected";

// =========================================================================
// Three.js 3D Skeleton
// =========================================================================
let updateSkeleton = (_kps) => {};

(function init3D() {
  try {
    const container = document.getElementById("canvas-container");
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0a14, 3, 10);

    const cam = new THREE.PerspectiveCamera(45, container.clientWidth / (container.clientHeight || 1), 0.1, 20);
    cam.position.set(1.5, 1.2, 2.5);
    cam.lookAt(0, 0.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(cam, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    scene.add(new THREE.DirectionalLight(0xffffff, 0.4));
    scene.add(new THREE.GridHelper(3, 20, 0x333355, 0x1a1a2e));

    const jointsGroup = new THREE.Group();
    scene.add(jointsGroup);
    const jointMeshes = [];
    for (let i = 0; i < 17; i++) {
      const geo = new THREE.SphereGeometry(0.025, 16, 16);
      const mat = new THREE.MeshBasicMaterial({ color: 0x60a5fa });
      const mesh = new THREE.Mesh(geo, mat);
      jointsGroup.add(mesh);
      jointMeshes.push(mesh);
    }

    const linesMaterial = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 });
    const linesGroup = new THREE.Group();
    scene.add(linesGroup);

    const H36M_BONES = [
      [0,1],[1,2],[2,3], [0,4],[4,5],[5,6],
      [0,7],[7,8],[8,9],[9,10], [8,11],[11,12],
      [12,13],[8,14],[14,15],[15,16]
    ];

    updateSkeleton = (kps) => {
      for (let i = 0; i < 17; i++) {
        jointMeshes[i].position.set(kps[i][0], -kps[i][1], kps[i][2] || 0);
      }
      linesGroup.clear();
      const points = [];
      H36M_BONES.forEach(([a, b]) => {
        const pa = jointMeshes[a].position, pb = jointMeshes[b].position;
        points.push(new THREE.Vector3(pa.x, pa.y, pa.z), new THREE.Vector3(pb.x, pb.y, pb.z));
      });
      linesGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(points), linesMaterial));
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, cam);
    }
    animate();

    window.addEventListener("resize", () => {
      cam.aspect = container.clientWidth / (container.clientHeight || 1);
      cam.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  } catch (_e) {
    document.getElementById("three-area").innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:13px">3D unavailable</div>';
  }
})();

// =========================================================================
// Split-pane drag
// =========================================================================
const vidArea = document.getElementById("video-area");
const threeArea = document.getElementById("three-area");
const divider = document.getElementById("divider");
let dragging = false;

divider.addEventListener("mousedown", () => {
  dragging = true;
  document.body.style.cursor = "row-resize";
  document.body.style.userSelect = "none";
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const rect = document.getElementById("view").getBoundingClientRect();
  const topH = e.clientY - rect.top - divider.offsetHeight / 2;
  const total = rect.height - divider.offsetHeight;
  const flexTop = Math.max(1, Math.min(total - 60, topH));
  vidArea.style.flex = flexTop;
  threeArea.style.flex = total - flexTop;
});

document.addEventListener("mouseup", () => {
  dragging = false;
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
});

// =========================================================================
// Pose menu
// =========================================================================
const nav = document.getElementById("nav");
let activeItem = null;
function selectPose(el, name) {
  if (activeItem) activeItem.classList.remove("active");
  el.classList.add("active");
  activeItem = el;
  fetch("/poses", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pose: name }) });
}

fetch("/poses").then(r => r.json()).then(data => {
  data.poses.forEach(name => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = name;
    div.onclick = () => selectPose(div, name);
    nav.appendChild(div);
  });
  if (nav.children.length > 1) selectPose(nav.children[1], data.poses[0]);
});
</script>
</body>
</html>
