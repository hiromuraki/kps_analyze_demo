<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPS Analyze Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; background: #111; color: #ccc; font-family: monospace; }
  #left { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
  #left img { max-width: 100%; max-height: 100vh; }
  #right { width: 320px; display: flex; flex-direction: column; background: #1a1a1a; border-left: 1px solid #333; }
  #right h3 { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; font-size: 14px; }
  #log { flex: 1; overflow-y: auto; padding: 8px 16px; }
  #log .msg { padding: 4px 0; border-bottom: 1px solid #222; font-size: 12px; line-height: 1.5; }
  #log .msg .ts { color: #888; }
</style>
</head>
<body>
<div id="left"><img id="stream" alt="waiting for stream..." /></div>
<div id="right">
  <h3>Messages</h3>
  <div id="log"></div>
</div>
<script>
const img = document.getElementById("stream");
const logEl = document.getElementById("log");
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.binaryType = "blob";

ws.onmessage = (e) => {
  if (e.data instanceof Blob) {
    const url = URL.createObjectURL(e.data);
    img.src = url;
    img.onload = () => URL.revokeObjectURL(url);
  } else {
    const msg = JSON.parse(e.data);
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="ts">${msg.ts}</span> ${msg.text}`;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }
};

ws.onclose = () => img.alt = "disconnected";
</script>
</body>
</html>
