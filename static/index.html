<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPS Analyze Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; background: #111; color: #ccc; font-family: monospace; overflow: hidden; }

  /* ---- 左侧菜单 ---- */
  #nav { width: 180px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
  #nav h3 { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; font-size: 13px; }
  #nav .item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; transition: background .15s; }
  #nav .item:hover { background: #2a2a2a; }
  #nav .item.active { background: #0a4; color: #fff; }

  /* ---- 右侧主区域（上下分栏） ---- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #top { flex: 3; display: flex; min-height: 0; }
  #top #center { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
  #top #center img { max-width: 100%; max-height: 100%; }
  #top #right { width: 320px; display: flex; flex-direction: column; background: #1a1a1a; border-left: 1px solid #333; flex-shrink: 0; }
  #top #right h3 { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; font-size: 14px; }
  #log { flex: 1; overflow-y: auto; padding: 8px 16px; }
  #log .msg { padding: 4px 0; border-bottom: 1px solid #222; font-size: 12px; line-height: 1.5; }
  #log .msg .ts { color: #888; }

  /* ---- 分割线 ---- */
  #divider { height: 6px; background: #333; cursor: row-resize; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
  #divider:hover { background: #555; }
  #divider .handle { width: 40px; height: 3px; background: #888; border-radius: 2px; }

  /* ---- 底部 3D 面板 ---- */
  #bottom { flex: 2; background: #0a0a14; min-height: 0; position: relative; }
  #canvas-container { width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- 左侧菜单 -->
<div id="nav"><h3>Poses</h3></div>

<!-- 主区域 -->
<div id="main">
  <div id="top">
    <div id="center"><img id="stream" alt="waiting for stream..." /></div>
    <div id="right">
      <h3>动作计数 <span id="rep-count" style="color:#0f0;font-size:24px;float:right">0</span></h3>
      <div id="log"></div>
    </div>
  </div>

  <!-- 可拖拽分割线 -->
  <div id="divider"><span class="handle"></span></div>

  <!-- 3D 骨骼 -->
  <div id="bottom">
    <div id="canvas-container"></div>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =========================================================================
// WebSocket
// =========================================================================
const img = document.getElementById("stream");
const logEl = document.getElementById("log");
const repEl = document.getElementById("rep-count");
const ws = new WebSocket(`ws://${location.host}/ws`);
ws.binaryType = "blob";

ws.onmessage = (e) => {
  if (e.data instanceof Blob) {
    const url = URL.createObjectURL(e.data);
    img.src = url;
    img.onload = () => URL.revokeObjectURL(url);
  } else {
    const msg = JSON.parse(e.data);
    if (msg.type === "log") {
      if (msg.text.startsWith("rep:")) {
        repEl.textContent = msg.text.slice(4);
      }
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="ts">${msg.ts}</span> ${msg.text}`;
      logEl.appendChild(div);
      while (logEl.children.length > 300) logEl.firstChild.remove();
      logEl.scrollTop = logEl.scrollHeight;
    } else if (msg.type === "kps3d") {
      updateSkeleton(msg.data);
    }
  }
};
ws.onclose = () => img.alt = "disconnected";

// =========================================================================
// Three.js 3D Skeleton（WebGL 不可用时降级为占位文字）
// =========================================================================
let updateSkeleton = (_kps) => {};  // 默认 no-op

(function init3D() {
  try {
    const container = document.getElementById("canvas-container");
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0a14, 3, 10);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / (container.clientHeight || 1), 0.1, 20);
    camera.position.set(1.5, 1.2, 2.5);
    camera.lookAt(0, 0.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    scene.add(new THREE.DirectionalLight(0xffffff, 0.4));

    const grid = new THREE.GridHelper(3, 20, 0x333355, 0x1a1a2e);
    scene.add(grid);

    // Joint spheres
    const jointsGroup = new THREE.Group();
    scene.add(jointsGroup);
    const jointMeshes = [];
    for (let i = 0; i < 17; i++) {
      const geo = new THREE.SphereGeometry(0.025, 16, 16);
      const mat = new THREE.MeshBasicMaterial({ color: 0x60a5fa });
      const mesh = new THREE.Mesh(geo, mat);
      jointsGroup.add(mesh);
      jointMeshes.push(mesh);
    }

    // Bone lines
    const linesMaterial = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 });
    const linesGroup = new THREE.Group();
    scene.add(linesGroup);

    const H36M_BONES = [
      [0,1],[1,2],[2,3], [0,4],[4,5],[5,6],
      [0,7],[7,8],[8,9],[9,10], [8,11],[11,12],
      [12,13],[8,14],[14,15],[15,16]
    ];

    updateSkeleton = (kps) => {
      for (let i = 0; i < 17; i++) {
        jointMeshes[i].position.set(kps[i][0], -kps[i][1], kps[i][2] || 0);
      }
      linesGroup.clear();
      const points = [];
      H36M_BONES.forEach(([a, b]) => {
        const pa = jointMeshes[a].position;
        const pb = jointMeshes[b].position;
        points.push(new THREE.Vector3(pa.x, pa.y, pa.z));
        points.push(new THREE.Vector3(pb.x, pb.y, pb.z));
      });
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      linesGroup.add(new THREE.LineSegments(geo, linesMaterial));
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = container.clientWidth / (container.clientHeight || 1);
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  } catch (_e) {
    const bottom = document.getElementById("bottom");
    bottom.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:13px">3D skeleton unavailable (WebGL not supported)</div>';
    // updateSkeleton 保持上面的空函数
  }
})();

// =========================================================================
// Split-pane drag
// =========================================================================
const topPane = document.getElementById("top");
const bottomPane = document.getElementById("bottom");
const divider = document.getElementById("divider");
let dragging = false;

divider.addEventListener("mousedown", () => {
  dragging = true;
  document.body.style.cursor = "row-resize";
  document.body.style.userSelect = "none";
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const main = document.getElementById("main");
  const rect = main.getBoundingClientRect();
  const topH = e.clientY - rect.top - divider.offsetHeight / 2;
  const total = rect.height - divider.offsetHeight;
  const flexTop = Math.max(1, Math.min(total - 1, topH));
  const flexBottom = total - flexTop;
  topPane.style.flex = flexTop;
  bottomPane.style.flex = flexBottom;
});

document.addEventListener("mouseup", () => {
  dragging = false;
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
});

// =========================================================================
// Pose menu
// =========================================================================
const nav = document.getElementById("nav");
let activeItem = null;
function selectPose(el, name) {
  if (activeItem) activeItem.classList.remove("active");
  el.classList.add("active");
  activeItem = el;
  fetch("/poses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pose: name }),
  });
}

fetch("/poses")
  .then(r => r.json())
  .then(data => {
    data.poses.forEach(name => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = name;
      div.onclick = () => selectPose(div, name);
      nav.appendChild(div);
    });
    if (nav.children.length > 1) selectPose(nav.children[1], data.poses[0]);
  });
</script>
</body>
</html>
